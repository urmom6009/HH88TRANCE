server {
	listen 8080;
	server_name _;

	location /download-file/ {
		alias /srv/storefront-media/products/;

		secure_link $arg_sig,$arg_expires;
		secure_link_md5 "$secure_link_expires$uri storefront-download-secret";

		if ($secure_link = "") {
			return 403;
		}

		if ($secure_link = "0") {
			return 410;
		}

		sendfile on;
		tcp_nopush on;
		aio threads;

		add_header Accept-Ranges bytes;
		add_header X-Content-Type-Options nosniff;
	}

	location / {
		return 404;
	}
}
